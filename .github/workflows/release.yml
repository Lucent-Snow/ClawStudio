name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, e.g. 0.1.1"
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release secrets
        shell: pwsh
        run: |
          if (-not "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}".Trim()) {
            throw "Missing GitHub secret: TAURI_SIGNING_PRIVATE_KEY. Generate an updater key first and add the private key content to repository secrets."
          }

      - name: Validate updater configuration
        shell: pwsh
        run: |
          $config = Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json
          $updater = $config.plugins.updater
          if (-not $updater.active) {
            throw "Tauri updater is disabled in src-tauri/tauri.conf.json"
          }
          if (-not $updater.pubkey -or -not $updater.pubkey.Trim()) {
            throw "Missing updater pubkey in src-tauri/tauri.conf.json"
          }
          if (-not $updater.endpoints -or $updater.endpoints.Count -eq 0) {
            throw "Missing updater endpoints in src-tauri/tauri.conf.json"
          }

      - name: Derive release metadata
        id: release_meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".Trim()
            if (-not $version) {
              throw "workflow_dispatch requires a version input"
            }
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
            $tag = "v$version"
          } else {
            $tag = "${{ github.ref_name }}"
            if (-not $tag.StartsWith("v")) {
              throw "Expected tag starting with 'v', got: $tag"
            }
            $version = $tag.Substring(1)
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run type checks
        run: npm run typecheck

      - name: Sync app version into build files
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.APP_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          node -e "const fs=require('fs'); const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); lock.version=process.env.APP_VERSION; if (lock.packages && lock.packages['']) { lock.packages[''].version=process.env.APP_VERSION; } fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');"
          node -e "const fs=require('fs'); const cfg=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); cfg.version=process.env.APP_VERSION; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');"
          $cargo = Get-Content 'src-tauri/Cargo.toml' -Raw
          $cargo = [regex]::Replace($cargo, '(?m)^version = ".*?"', ('version = "' + $version + '"'), 1)
          Set-Content 'src-tauri/Cargo.toml' $cargo -Encoding utf8NoBOM
        env:
          APP_VERSION: ${{ steps.release_meta.outputs.version }}

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: "ClawStudio ${{ steps.release_meta.outputs.tag }}"
          releaseBody: "Automated Windows release for ClawStudio."
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
